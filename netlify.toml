[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/lib/**"]
  external_node_modules = ["@upstash/redis", "@netlify/blobs", "sqlite3"]

[functions."download"]
  timeout = 26

[functions."stream"]
  timeout = 26

# Optional shortcuts — frontend uses /.netlify/functions/* directly
[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/download"
  status = 200

[[redirects]]
  from = "/api/size"
  to = "/.netlify/functions/size"
  status = 200

[[redirects]]
  from = "/api/stream"
  to = "/.netlify/functions/stream"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/queue"
  to = "/.netlify/functions/queue"
  status = 200

[[redirects]]
  from = "/api/queue/status"
  to = "/.netlify/functions/queue"
  status = 200

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/dashboard"
  to = "/.netlify/functions/admin-api"
  status = 200

[[redirects]]
  from = "/api/admin/collect"
  to = "/.netlify/functions/admin-collect"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[functions."admin-api"]
  timeout = 26

[functions."admin-collect"]
  timeout = 10

[functions."admin-login"]
  timeout = 10

[[headers]]
  for = "/api.config.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/og-image.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
